# ============================================================
# 国航内部员工智能知识助手 - Docker Compose（生产模式）
# 启动：docker compose up -d
# 停止：docker compose down
# ============================================================

version: "3.8"

services:
  # ---------- Qdrant 向量数据库 ----------
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: airchina-qdrant
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - airchina-net

  # ---------- FastAPI 应用 ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airchina-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - airchina-net

  # ---------- Nginx 反向代理 ----------
  nginx:
    image: nginx:alpine
    container_name: airchina-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - airchina-net

volumes:
  qdrant_data:
    name: airchina_qdrant_data

networks:
  airchina-net:
    name: airchina_net
