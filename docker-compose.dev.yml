# ============================================================
# 开发模式 Docker Compose
# 启动：docker compose -f docker-compose.dev.yml up -d
# 特点：源码挂载、热重载、仅启动 Qdrant（API 在本地运行）
# ============================================================

version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: airchina-qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data_dev:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  qdrant_data_dev:
    name: airchina_qdrant_data_dev
